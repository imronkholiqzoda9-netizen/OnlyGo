<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OnlyGo — фильмы, сериалы, спорт</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ============================================================
           RESET & BASE
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-primary: #0a0a12;
            --bg-secondary: #12121e;
            --bg-card: #1a1a2e;
            --bg-hover: #262644;
            --text-primary: #f0f2f8;
            --text-secondary: #b0b2c8;
            --text-muted: #556677;
            --border-color: rgba(255, 255, 255, 0.04);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 12px 48px rgba(0, 0, 0, 0.4);
            --radius: 20px;
            --radius-sm: 12px;
            --radius-lg: 28px;
            --gradient: linear-gradient(135deg, #6c5ce7, #0984e3);
            --gradient-red: linear-gradient(135deg, #e74c3c, #f39c12);
            --primary: #6c5ce7;
            --success: #00b894;
            --danger: #e74c3c;
            --warning: #f7c948;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding-bottom: 80px;
            overflow-x: hidden;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        /* ============================================================
           LOADING
           ============================================================ */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s, visibility 0.6s;
        }
        #loader.hidden {
            opacity: 0;
            visibility: hidden;
        }
        #loader .brand {
            font-size: 4rem;
            font-weight: 900;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #loader .spinner {
            margin-top: 24px;
            width: 48px;
            height: 48px;
            border: 4px solid rgba(108, 92, 231, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 10, 18, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 0;
            transition: 0.3s;
        }
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .logo i {
            -webkit-text-fill-color: var(--primary);
        }
        .header-search {
            flex: 1;
            max-width: 420px;
            min-width: 140px;
            display: flex;
            align-items: center;
            background: var(--bg-secondary);
            border-radius: 40px;
            padding: 0 16px;
            border: 1px solid var(--border-color);
            transition: 0.3s;
        }
        .header-search:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.06);
        }
        .header-search input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 12px;
            font-size: 0.9rem;
            color: var(--text-primary);
            outline: none;
        }
        .header-search i {
            color: var(--text-muted);
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .header-actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.1rem;
            padding: 6px 10px;
            border-radius: 40px;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }
        .header-actions button:hover {
            color: var(--primary);
            background: rgba(108, 92, 231, 0.04);
        }
        .header-actions .badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: var(--danger);
            color: #fff;
            font-size: 0.5rem;
            font-weight: 700;
            min-width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ============================================================
           BOTTOM NAV
           ============================================================ */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 18, 0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-color);
            z-index: 999;
            padding: 6px 0 12px;
            justify-content: space-around;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.55rem;
            color: var(--text-muted);
            transition: 0.3s;
            gap: 2px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 12px;
        }
        .bottom-nav a i {
            font-size: 1.2rem;
        }
        .bottom-nav a.active {
            color: var(--primary);
        }
        .bottom-nav a:hover {
            color: var(--primary);
        }
        @media (max-width: 768px) {
            .bottom-nav {
                display: flex;
            }
        }

        /* ============================================================
           PAGES
           ============================================================ */
        .page {
            display: none;
            animation: fadeUp 0.4s ease;
            padding: 20px 0 40px;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .page-title i {
            color: var(--primary);
        }
        .page-title .count {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* ============================================================
           HERO BANNER
           ============================================================ */
        .hero-banner {
            position: relative;
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 32px;
            background: var(--gradient);
            min-height: 320px;
            display: flex;
            align-items: center;
            padding: 40px 48px;
            background-size: cover;
            background-position: center;
        }
        .hero-banner .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(10, 10, 18, 0.85) 0%, transparent 100%);
        }
        .hero-banner .content {
            position: relative;
            z-index: 1;
            max-width: 500px;
        }
        .hero-banner .content .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .hero-banner .content h1 {
            font-size: 2.4rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 8px;
        }
        .hero-banner .content p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            margin-bottom: 16px;
            max-width: 380px;
        }
        .hero-banner .content .btn-watch {
            background: #fff;
            color: #1a1a2e;
            padding: 12px 32px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .hero-banner .content .btn-watch:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 32px rgba(255, 255, 255, 0.15);
        }
        @media (max-width: 768px) {
            .hero-banner {
                padding: 30px 24px;
                min-height: 240px;
            }
            .hero-banner .content h1 {
                font-size: 1.6rem;
            }
            .hero-banner .content p {
                font-size: 0.85rem;
            }
        }

        /* ============================================================
           CATEGORIES
           ============================================================ */
        .categories-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 4px 0 16px;
            scrollbar-width: none;
        }
        .categories-scroll::-webkit-scrollbar {
            display: none;
        }
        .categories-scroll .cat-item {
            padding: 6px 20px;
            border-radius: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.3s;
            color: var(--text-secondary);
        }
        .categories-scroll .cat-item:hover {
            border-color: var(--primary);
            color: var(--text-primary);
        }
        .categories-scroll .cat-item.active {
            background: var(--gradient);
            color: #fff;
            border-color: transparent;
        }

        /* ============================================================
           CONTENT CARDS
           ============================================================ */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .content-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: 0.3s;
            cursor: pointer;
        }
        .content-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
            border-color: var(--primary);
        }
        .content-card .poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--primary);
            position: relative;
            overflow: hidden;
        }
        .content-card .poster .play-icon {
            position: absolute;
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.8);
            opacity: 0;
            transition: 0.3s;
        }
        .content-card:hover .poster .play-icon {
            opacity: 1;
        }
        .content-card .poster .rating-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--warning);
        }
        .content-card .info {
            padding: 14px 16px 16px;
        }
        .content-card .info .title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .content-card .info .meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .content-card .info .meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ============================================================
           SPORT CARDS
           ============================================================ */
        .match-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .match-card:hover {
            border-color: var(--primary);
            transform: translateX(4px);
        }
        .match-card .teams {
            display: flex;
            align-items: center;
            gap: 16px;
            font-weight: 600;
        }
        .match-card .teams .vs {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.8rem;
        }
        .match-card .score {
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--primary);
        }
        .match-card .match-info {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        .match-card .match-status {
            padding: 2px 14px;
            border-radius: 40px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-live {
            background: var(--danger);
            color: #fff;
            animation: pulse 1.5s infinite;
        }
        .status-upcoming {
            background: var(--primary);
            color: #fff;
        }
        .status-finished {
            background: var(--bg-secondary);
            color: var(--text-muted);
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        /* ============================================================
           PLAYER
           ============================================================ */
        .player-container {
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
            aspect-ratio: 16/9;
            position: relative;
            margin-bottom: 20px;
        }
        .player-container video {
            width: 100%;
            height: 100%;
            display: block;
        }
        .player-container .player-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .player-container .player-overlay button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(4px);
        }
        .player-container .player-overlay button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ============================================================
           SEARCH RESULTS
           ============================================================ */
        .search-results {
            padding: 20px 0;
        }

        /* ============================================================
           AUTH
           ============================================================ */
        .auth-container {
            max-width: 400px;
            margin: 20px 0;
        }
        .auth-container input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
            margin-bottom: 12px;
        }
        .auth-container input:focus {
            border-color: var(--primary);
        }
        .auth-container button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--gradient);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .auth-container button:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.2);
        }
        .auth-container .switch {
            text-align: center;
            margin-top: 12px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .auth-container .switch a {
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
        }
        .auth-container .error {
            color: var(--danger);
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        /* ============================================================
           ADMIN
           ============================================================ */
        .admin-panel {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border-color);
            margin-top: 20px;
        }
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }
        .admin-stats .stat {
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            padding: 16px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .admin-stats .stat .num {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary);
        }
        .admin-stats .stat .label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .admin-form {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 16px 0;
            align-items: flex-end;
        }
        .admin-form .field {
            flex: 1 1 150px;
        }
        .admin-form label {
            display: block;
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .admin-form input,
        .admin-form select,
        .admin-form textarea {
            width: 100%;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
        }
        .admin-form input:focus,
        .admin-form select:focus,
        .admin-form textarea:focus {
            border-color: var(--primary);
        }
        .admin-form .btn-submit {
            padding: 8px 24px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--gradient);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            height: 40px;
        }
        .admin-form .btn-submit:hover {
            transform: scale(1.02);
        }
        .admin-table-wrap {
            overflow-x: auto;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .admin-table th,
        .admin-table td {
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .admin-table th {
            color: var(--text-muted);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .admin-table .actions button {
            padding: 2px 10px;
            border: none;
            border-radius: 40px;
            font-size: 0.6rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .admin-table .actions .edit-btn {
            background: var(--warning);
            color: #1a1a2e;
        }
        .admin-table .actions .delete-btn {
            background: var(--danger);
            color: #fff;
        }
        .admin-table .actions .block-btn {
            background: #e67e22;
            color: #fff;
        }
        .admin-table .actions .unblock-btn {
            background: var(--success);
            color: #fff;
        }

        /* ============================================================
           TOAST
           ============================================================ */
        .toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            background: var(--bg-card);
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow);
            animation: slideRight 0.3s ease;
            max-width: 360px;
            border-left: 4px solid var(--primary);
            border: 1px solid var(--border-color);
        }
        .toast.success {
            border-left-color: var(--success);
        }
        .toast.error {
            border-left-color: var(--danger);
        }
        .toast.warning {
            border-left-color: var(--warning);
        }
        @keyframes slideRight {
            0% {
                opacity: 0;
                transform: translateX(40px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ============================================================
           MODAL
           ============================================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 9998;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 32px;
            max-width: 560px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            animation: fadeUp 0.3s ease;
        }
        .modal .close-btn {
            float: right;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.3s;
        }
        .modal .close-btn:hover {
            color: var(--danger);
            transform: rotate(90deg);
        }
        .modal .detail-poster {
            font-size: 5rem;
            text-align: center;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
        }
        .modal .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;

        @media (max-width: 768px) {

        function init() {
            // Загрузка из LocalStorage
            const savedContent = localStorage.getItem('onlygo_content');
            const savedSport = localStorage.getItem('onlygo_sport');
            const savedFavorites = localStorage.getItem('onlygo_favorites');
            const savedHistory = localStorage.getItem('onlygo_history');
            const savedUsers = localStorage.getItem('onlygo_users');
            const savedUser = localStorage.getItem('onlygo_current_user');
            const savedAdmin = localStorage.getItem('onlygo_admin');

            if (savedContent) {
                try { content = JSON.parse(savedContent); } catch (e) { content = getDefaultContent(); }
            } else {
                content = getDefaultContent();
            }

            if (savedSport) {
                try { sportEvents = JSON.parse(savedSport); } catch (e) { sportEvents = getDefaultSport(); }
            } else {
                sportEvents = getDefaultSport();
            }

            if (savedFavorites) {
                try { favorites = JSON.parse(savedFavorites); } catch (e) { favorites = []; }
            }

            if (savedHistory) {
                try { history = JSON.parse(savedHistory); } catch (e) { history = []; }
            }

            if (savedUsers) {
                try { users = JSON.parse(savedUsers); } catch (e) { users = []; }

            if (savedUser) {

            renderProfile();

        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

            if (target) target.classList.add('active');

            document.querySelectorAll('.bottom-nav a').forEach(a => a.classList.remove('active'));
            const navMap = { home: 0, movies: 1, series: 2, sport: 3, profile: 4 };
            if (navMap[page] !== undefined) {
                const items = document.querySelectorAll('.bottom-nav a');
                if (items[navMap[page]]) items[navMap[page]].classList.add('active');
            }

            if (page === 'home') renderHome();
            if (page === 'movies') renderMovies();
            if (page === 'series') renderSeries();
            if (page === 'sport') renderSport();
            if (page === 'favorites') renderFavorites();
            if (page === 'profile') renderProfile();
            if (page === 'admin') renderAdmin();

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ================================================================
        // 6. КАТЕГОРИИ
        // ================================================================

        function renderCategories() {
            const container = document.getElementById('categoriesScroll');
            const categories = ['Все', 'Новинки', 'Популярное', 'Боевики', 'Комедии', 'Драмы', 'Ужасы', 'Фантастика',
                'Мультфильмы', 'Документальные'
            ];
            container.innerHTML = categories.map((cat, i) =>
                `<span class="cat-item ${i === 0 ? 'active' : ''}" onclick="filterCategory('${cat === 'Все' ? 'all' : cat}', this)">${cat}</span>`
            ).join('');
        }

        function filterCategory(category, el) {
            currentCategory = category;
            document.querySelectorAll('.categories-scroll .cat-item').forEach(c => c.classList.remove('active'));
            if (el) el.classList.add('active');
            renderHome();
            renderMovies();
            renderSeries();
        }

        function filterSport(type, el) {
            document.querySelectorAll('#page-sport .cat-item').forEach(c => c.classList.remove('active'));
            if (el) el.classList.add('active');
            renderSport(type);
        }

        // ================================================================
        // 7. ОТРИСОВКА КОНТЕНТА
        // ================================================================

        function renderContentCard(item) {
            const isFav = favorites.includes(item.id);
            const ratingStars = '⭐'.repeat(Math.floor(item.rating || 0)) + (item.rating % 1 >= 0.5 ? '⭐' : '');
            const badge = item.isNew ? '<span class="badge-new">Новинка</span>' : '';
            const typeIcon = item.type === 'movie' ? '🎬' : '📺';

            return `
                <div class="content-card" onclick="openDetail(${item.id})">
                    <div class="poster">
                        ${item.poster || '📦'}
                        <div class="play-icon"><i class="fas fa-play-circle"></i></div>
                        <div class="rating-badge">${ratingStars || '☆☆☆☆☆'} ${item.rating || 0}</div>
                        ${badge}
                    </div>
                    <div class="info">
                        <div class="title">${item.title}</div>
                        <div class="meta">
                            <span>${item.year}</span>
                            <span>${item.genre ? item.genre.split(',')[0] : ''}</span>
                            <span>${typeIcon}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderHome() {
            const container = document.getElementById('homeContent');
            let filtered = content;

            if (currentCategory !== 'all') {
                if (currentCategory === 'Новинки') filtered = content.filter(c => c.isNew);
                else if (currentCategory === 'Популярное') filtered = content.filter(c => c.isPopular);
                else filtered = content.filter(c => c.genre && c.genre.includes(currentCategory));
            }

            const display = filtered.slice(0, 8);
            container.innerHTML = display.map(c => renderContentCard(c)).join('');
            document.getElementById('homeCount').textContent = `(${filtered.length})`;
        }

        function renderMovies() {
            const container = document.getElementById('moviesContent');
            let filtered = content.filter(c => c.type === 'movie');
            if (currentCategory !== 'all' && currentCategory !== 'Новинки' && currentCategory !== 'Популярное') {
                filtered = filtered.filter(c => c.genre && c.genre.includes(currentCategory));
            }
            if (currentCategory === 'Новинки') filtered = filtered.filter(c => c.isNew);
            if (currentCategory === 'Популярное') filtered = filtered.filter(c => c.isPopular);

            container.innerHTML = filtered.map(c => renderContentCard(c)).join('');
            document.getElementById('moviesCount').textContent = `(${filtered.length})`;
        }

        function renderSeries() {
            const container = document.getElementById('seriesContent');
            let filtered = content.filter(c => c.type === 'series');
            if (currentCategory !== 'all' && currentCategory !== 'Новинки' && currentCategory !== 'Популярное') {
                filtered = filtered.filter(c => c.genre && c.genre.includes(currentCategory));
            }
            if (currentCategory === 'Новинки') filtered = filtered.filter(c => c.isNew);
            if (currentCategory === 'Популярное') filtered = filtered.filter(c => c.isPopular);

            container.innerHTML = filtered.map(c => renderContentCard(c)).join('');
            document.getElementById('seriesCount').textContent = `(${filtered.length})`;
        }

        function renderSport(type) {
            const container = document.getElementById('sportContent');
            let filtered = sportEvents;
            if (type === 'live') filtered = sportEvents.filter(s => s.status === 'live');
            else if (type === 'upcoming') filtered = sportEvents.filter(s => s.status === 'upcoming');
            else if (type === 'finished') filtered = sportEvents.filter(s => s.status === 'finished');

            const statusMap = {
                live: '<span class="match-status status-live">● LIVE</span>',
                upcoming: '<span class="match-status status-upcoming">📅 Скоро</span>',

            };

                football: '⚽',
                basketball: '🏀',
                tennis: '🎾',
                mma: '🥊',
                formula1: '🏎️'
            };

            container.innerHTML = filtered.map(s => `
                <div class="match-card" onclick="openSportDetail(${s.id})">

                favorites.push(id);
                showToast('Добавлено в избранное', 'success');

            updateFavBadge();
            renderFavorites();
            renderHome();
            renderMovies();
            renderSeries();

            document.getElementById('favBadge').textContent = favorites.length;

            const container = document.getElementById('favoritesContent');
            const favContent = content.filter(c => favorites.includes(c.id));

        function watchContent(id) {

                        <button onclick="showToast('⏩ Перемотка вперёд', 'warning')" style="background:var(--bg-secondary);color:#fff;padding:8px 16px;border:none;border-radius:40px;cursor:pointer;">⏩ 10с</button>
                        <button onclick="showToast('🔊 Громкость 70%', 'warning')" style="background:var(--bg-secondary);color:#fff;padding:8px 16px;border:none;border-radius:40px;cursor:pointer;">🔊</button>

                    </div>
                    <div style="width:80%;height:4px;background:var(--bg-secondary);border-radius:10px;position:relative;">
                        <div style="width:30%;height:100%;background:var(--primary);border-radius:10px;"></div>
                    </div>
                    <button class="close-btn" onclick="closeModal()" style="background:var(--bg-secondary);color:#fff;padding:8px 24px;border:none;border-radius:40px;cursor:pointer;font-size:0.85rem;">Закрыть плеер</button>
                </div>
            `;
            modal.classList.add('active');
        }

        // ================================================================
        // 11. ПОИСК
        // ================================================================

        function searchContent() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) {
                renderHome();
                renderMovies();
                renderSeries();
                return;
            }

            const results = content.filter(c =>
                c.title.toLowerCase().includes(query) ||
                c.genre.toLowerCase().includes(query) ||
                c.country.toLowerCase().includes(query) ||
                c.year.toString().includes(query)
            );

            // Показываем результаты на главной
            const container = document.getElementById('homeContent');
            if (results.length > 0) {
                container.innerHTML = results.map(c => renderContentCard(c)).join('');
                document.getElementById('homeCount').textContent = `(Найдено: ${results.length})`;
                // Переключаем на главную если не на ней
                if (!document.getElementById('page-home').classList.contains('active')) {
                    showPage('home');
                }
                                // Обновляем заголовок
                document.querySelector('#page-home .page-title').innerHTML = `
                    <i class="fas fa-search" style="color:var(--primary);"></i> Результаты поиска
                    <span class="count">(${results.length})</span>
                `;
            } else {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-search"></i>Ничего не найдено</div>`;
                document.getElementById('homeCount').textContent = '(0)';
            }
        }

        // ================================================================
        // 12. ПРОФИЛЬ
        // ================================================================

        function renderProfile() {
            const container = document.getElementById('profileContent');
            if (!container) return;

            if (!currentUser) {
                container.innerHTML = `
                    <div class="auth-container">
                        <h3 style="margin-bottom:16px;">Вход в OnlyGo</h3>
                        <div id="authError" class="error"></div>
                        <input type="email" id="loginEmail" placeholder="Email" value="admin@onlygo.com" />
                        <input type="password" id="loginPassword" placeholder="Пароль" value="admin123" />
                        <button onclick="login()"><i class="fas fa-sign-in-alt"></i> Войти</button>
                        <div class="switch">
                            Нет аккаунта? <a onclick="showRegister()">Зарегистрироваться</a>
                        </div>
                    </div>
                `;

            }

            const historyCount = history.filter(h => h.id).length;

            container.innerHTML = `
                <div class="profile-card">
                    <h3 style="margin-bottom:12px;">👤 ${currentUser.name}</h3>

                        </button>
                    </div>
                    ${historyCount > 0 ? `
                        <div style="margin-top:16px;border-top:1px solid var(--border-color);padding-top:12px;">

                                </div>`

        function showRegister() {
            const container = document.getElementById('profileContent');
            container.innerHTML = `
                <div class="auth-container">
                    <h3 style="margin-bottom:16px;">Регистрация</h3>
                    <div id="authError" class="error"></div>
                    <input type="text" id="regName" placeholder="Имя" />
                    <input type="email" id="regEmail" placeholder="Email" />
                    <input type="password" id="regPassword" placeholder="Пароль" />
                    <input type="password" id="regPassword2" placeholder="Повторите пароль" />
                    <button onclick="register()"><i class="fas fa-user-plus"></i> Зарегистрироваться</button>
                    <div class="switch">
                        Уже есть аккаунт? <a onclick="renderProfile()">Войти</a>
                    </div>
                </div>
            `;
        }

        function register() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const password2 = document.getElementById('regPassword2').value;
            const error = document.getElementById('authError');

            if (!name || !email || !password) {
                error.textContent = 'Заполните все поля';
                return;
            }
            if (password !== password2) {
                error.textContent = 'Пароли не совпадают';
                return;
            }
            if (users.find(u => u.email === email)) {
                error.textContent = 'Пользователь уже существует';
                return;
            }

            const newUser = {
                id: users.length + 1,
                name: name,
                email: email,
                password: password,
                isAdmin: false,
                blocked: false
            };
            users.push(newUser);
            currentUser = newUser;
            saveData();
            showToast('Регистрация успешна!', 'success');
            renderProfile();
            renderAdmin();
        }

        function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const error = document.getElementById('authError');

            if (!email || !password) {
                error.textContent = 'Введите email и пароль';
                return;
            }

            const user = users.find(u => u.email === email && u.password === password);
            if (!user) {
                error.textContent = 'Неверный email или пароль';
                return;
            }
            if (user.blocked) {
                error.textContent = 'Аккаунт заблокирован';
                return;
            }

            currentUser = user;
            saveData();
            showToast(`Добро пожаловать, ${user.name}!`, 'success');
            renderProfile();
            renderAdmin();
        }

        function logout() {
            currentUser = null;
            isAdmin = false;
            saveData();
            showToast('Вы вышли', 'warning');
            renderProfile();
            renderAdmin();
        }

        function editProfile() {
            if (!currentUser) return;
            const newName = prompt('Новое имя:', currentUser.name);
            if (newName && newName.trim()) {
                currentUser.name = newName.trim();
                const user = users.find(u => u.id === currentUser.id);
                if (user) user.name = newName.trim();
                saveData();
                renderProfile();
                showToast('Профиль обновлён', 'success');
            }
        }

        // ================================================================
        // 13. ГЕРОЙ БАННЕР
        // ================================================================

        function updateHero() {
            const popular = content.filter(c => c.isPopular);
            if (popular.length > 0) {
                const random = popular[Math.floor(Math.random() * popular.length)];
                document.getElementById('heroTitle').textContent = random.title;
                document.getElementById('heroDesc').textContent = random.description || 'Самый популярный контент на OnlyGo';
                document.getElementById('heroBanner').style.background =
                    `linear-gradient(135deg, #6c5ce7, #0984e3)`;
            }
        }

            if (isAdmin) {
                showPage('admin');
                renderAdmin();
                return;
            }
            const password = prompt('Введите пароль администратора:');
            if (password === '2009') {
                isAdmin = true;
                saveData();
                showToast('Добро пожаловать в админ-панель!', 'success');
                showPage('admin');
                renderAdmin();

                showToast('Неверный пароль', 'error');
            }

                        <button type="submit" class="btn-submit"><i class="fas fa-plus"></i> Добавить</button>
                    </form>

                    <h3 class="admin-section-title"><i class="fas fa-list"></i> Управление контентом</h3>
                    <div class="admin-table-wrap">
                        <table class="admin-table">
                            <thead><tr><th>ID</th><th>Название</th><th>Тип</th><th>Год</th><th>Жанр</th><th>Действия</th></tr></thead>
                            <tbody id="adminContentTable"></tbody>
                        </table>
                    </div>

                    <h3 class="admin-section-title"><i class="fas fa-users"></i> Пользователи</h3>
                    <div class="admin-table-wrap">
                        <table class="admin-table">
                            <thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Роль</th><th>Статус</th><th>Действия</th></tr></thead>
                            <tbody id="adminUsersTable"></tbody>
                        </table>
                    </div>

                    <h3 class="admin-section-title"><i class="fas fa-futbol"></i> Спорт</h3>
                    <div class="admin-table-wrap">
                        <table class="admin-table">
                            <thead><tr><th>ID</th><th>Команда 1</th><th>Команда 2</th><th>Счёт</th><th>Статус</th><th>Действия</th></tr></thead>
                            <tbody id="adminSportTable"></tbody>
                        </table>
                    </div>
                </div>
            `;

            // Заполняем таблицы
            renderAdminContent();
            renderAdminUsers();
            renderAdminSport();

            // Обработка формы
            document.getElementById('adminAddForm').addEventListener('submit', function(e) {
                e.preventDefault();
                addContent();
            });
        }

        function renderAdminContent() {
            const tbody = document.getElementById('adminContentTable');
            if (!tbody) return;
            tbody.innerHTML = content.map(c => `
                <tr>
                    <td>${c.id}</td>
                    <td>${c.title}</td>
                    <td>${c.type === 'movie' ? '🎬 Фильм' : '📺 Сериал'}</td>
                    <td>${c.year}</td>
                    <td>${c.genre}</td>
                    <td class="actions">
                        <button class="edit-btn" onclick="editContent(${c.id})"><i class="fas fa-edit"></i></button>
                        <button class="delete-btn" onclick="deleteContent(${c.id})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function renderAdminUsers() {
            const tbody = document.getElementById('adminUsersTable');
            if (!tbody) return;
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.name}</td>
                    <td>${u.email}</td>
                    <td>${u.isAdmin ? '👑 Админ' : '👤 Пользователь'}</td>
                    <td>${u.blocked ? '🔴 Заблокирован' : '🟢 Активен'}</td>
                    <td class="actions">
                        ${!u.isAdmin ? (u.blocked ?
                            `<button class="unblock-btn" onclick="unblockUser(${u.id})">Разблок.</button>` :
                            `<button class="block-btn" onclick="blockUser(${u.id})">Заблок.</button>`) : ''}
                        <button class="delete-btn" onclick="deleteUser(${u.id})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function renderAdminSport() {
            const tbody = document.getElementById('adminSportTable');
            if (!tbody) return;
            tbody.innerHTML = sportEvents.map(s => `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.team1}</td>
                    <td>${s.team2}</td>
                    <td>${s.score || '—'}</td>
                    <td>${s.status}</td>
                    <td class="actions">
                        <button class="edit-btn" onclick="editSport(${s.id})"><i class="fas fa-edit"></i></button>
                        <button class="delete-btn" onclick="deleteSport(${s.id})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        // ================================================================
        // 15. АДМИН ДЕЙСТВИЯ
        // ================================================================

        function addContent() {
            const title = document.getElementById('adminTitle').value.trim();
            const type = document.getElementById('adminType').value;
            const year = parseInt(document.getElementById('adminYear').value) || 2024;
            const country = document.getElementById('adminCountry').value.trim() || 'США';
            const genre = document.getElementById('adminGenre').value.trim() || 'Фантастика';
            const duration = document.getElementById('adminDuration').value.trim() || '120 мин';
            const rating = parseFloat(document.getElementById('adminRating').value) || 5.0;
            const description = document.getElementById('adminDescription').value.trim() || 'Описание';
            const poster = document.getElementById('adminPoster').value.trim() || '🎬';
            const category = document.getElementById('adminCategory').value;

            if (!title) {
                showToast('Введите название', 'error');
                return;
            }

            content.push({
                id: nextContentId++,
                type: type,
                title: title,
                year: year,
                country: country,
                genre: genre,
                duration: duration,
                rating: rating,
                description: description,
                poster: poster,
                category: category,
                isNew: true,
                isPopular: false
            });

            saveData();
            showToast(`"${title}" добавлен`, 'success');
            renderAdmin();
            renderHome();
            renderMovies();
            renderSeries();
            document.getElementById('adminAddForm').reset();
        }

        function editContent(id) {
            const item = content.find(c => c.id === id);
            if (!item) return;

            const newTitle = prompt('Название:', item.title);
            if (newTitle === null) return;
            const newGenre = prompt('Жанр:', item.genre);
            if (newGenre === null) return;
            const newRating = prompt('Рейтинг (1-10):', item.rating);
            if (newRating === null) return;

            item.title = newTitle.trim() || item.title;
            item.genre = newGenre.trim() || item.genre;
            item.rating = parseFloat(newRating) || item.rating;

            saveData();
            showToast('Обновлено', 'success');
            renderAdmin();
            renderHome();
            renderMovies();
            renderSeries();
        }

        function deleteContent(id) {
            if (!confirm('Удалить контент?')) return;
            content = content.filter(c => c.id !== id);
            favorites = favorites.filter(f => f !== id);
            saveData();
            showToast('Удалено', 'warning');
            renderAdmin();
            renderHome();
            renderMovies();
            renderSeries();
            renderFavorites();
            updateFavBadge();
        }

        function editSport(id) {
            const item = sportEvents.find(s => s.id === id);
            if (!item) return;

            const newScore = prompt('Счёт:', item.score || '');
            if (newScore === null) return;
            const newStatus = prompt('Статус (live/upcoming/finished):', item.status);
            if (newStatus === null) return;

            item.score = newScore.trim() || null;
            item.status = newStatus.trim() || item.status;

            saveData();
            showToast('Спорт обновлён', 'success');
            renderAdmin();
            renderSport();
        }

        function deleteSport(id) {
            if (!confirm('Удалить событие?')) return;
            sportEvents = sportEvents.filter(s => s.id !== id);
            saveData();
            showToast('Событие удалено', 'warning');
            renderAdmin();
            renderSport();
        }

        function blockUser(id) {
            const user = users.find(u => u.id === id);
            if (!user || user.isAdmin) { showToast('Нельзя блокировать админа', 'error'); return; }
            user.blocked = true;
            saveData();
            showToast('Пользователь заблокирован', 'warning');
            renderAdmin();
        }

        function unblockUser(id) {
            const user = users.find(u => u.id === id);
            if (!user) return;
            user.blocked = false;
            saveData();
            showToast('Пользователь разблокирован', 'success');
            renderAdmin();
        }

        function deleteUser(id) {
            const user = users.find(u => u.id === id);
            if (!user || user.isAdmin) { showToast('Нельзя удалить админа', 'error'); return; }
            if (!confirm(`Удалить ${user.name}?`)) return;
            users = users.filter(u => u.id !== id);
            if (currentUser && currentUser.id === id) { currentUser = null;
                isAdmin = false; }
            saveData();
            showToast('Пользователь удалён', 'warning');
            renderAdmin();
            renderProfile();
        }

        // ================================================================
        // 16. УВЕДОМЛЕНИЯ
        // ================================================================

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(40px)';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // ================================================================
        // 17. ЗАПУСК
        // ================================================================

        document.addEventListener('DOMContentLoaded', init);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        console.log('🎬 OnlyGo приложение загружено!');
        console.log('📦 Контента:', content.length);
        console.log('👤 Пользователей:', users.length);
        console.log('⚽ Спорт событий:', sportEvents.length);
        console.log('⭐ Для входа в админ-панель нажмите на 🛡️');
        console.log('🔑 Пароль админа: 2009');
    </script>
</body>
</html>
